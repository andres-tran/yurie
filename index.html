<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Search Prototype</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="container">
    <h1 class="main-heading">AI Search</h1>
    <p class="subtitle">Search anything with AI-powered insights</p>

    <div class="search-box">
      <!-- Optional search icon (SVG) -->
      <span class="search-icon">
        <!-- You can replace this inline SVG with an <img> or icon font if you prefer -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>
      <input 
        type="text" 
        class="search-input" 
        placeholder="Search anything..."
        aria-label="Search"
      />
    </div>
  </div>
</body>
</html>
