<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Search</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <nav>
                <div class="logo">AI Search</div>
                <div class="theme-toggle">
                    <i class="fas fa-moon"></i>
                </div>
            </nav>
        </header>

        <main>
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Ask anything...">
                    <button id="searchButton">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <div class="search-suggestions">
                    <p>Try asking:</p>
                    <div class="suggestion-chips">
                        <span class="chip">What is quantum computing?</span>
                        <span class="chip">Latest AI developments</span>
                        <span class="chip">How does GPT work?</span>
                    </div>
                </div>
            </div>

            <div class="results-container" id="resultsContainer">
                <!-- Results will be dynamically inserted here -->
            </div>
        </main>

        <footer>
            <p>© 2024 AI Search. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
