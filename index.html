<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Search Web Browser</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Advanced Search</h1>
  </header>
  
  <main>
    <!-- Search Section -->
    <section id="search-section">
      <form id="search-form">
        <input type="text" id="search-input" placeholder="Enter your search query..." required />
        <button type="submit">Search</button>
        <button type="button" id="toggle-advanced">Advanced Options</button>
      </form>

      <!-- Advanced Options (initially hidden) -->
      <div id="advanced-options" class="hidden">
        <div class="option">
          <label for="date-filter">Filter by Date:</label>
          <input type="date" id="date-filter" />
        </div>
        <div class="option">
          <label for="language-filter">Language:</label>
          <select id="language-filter">
            <option value="">Any</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <!-- Add more language options as needed -->
          </select>
        </div>
        <!-- Add more advanced options here -->
      </div>
    </section>

    <!-- Results Section -->
    <section id="results-section">
      <h2>Results</h2>
      <div id="results">
        <!-- Search results will be injected here -->
      </div>
    </section>
  </main>
  
  <footer>
    <p>© 2025 Advanced Search Web Browser</p>
  </footer>
  
  <script src="main.js"></script>
</body>
</html>
