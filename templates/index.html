<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    
    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Yurie">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Yurie">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="A minimal AI chat assistant supporting text and image generation">
    <meta name="keywords" content="AI, chat, assistant, GPT, Claude, image generation">
    <meta name="author" content="Yurie">
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#000000">
    <meta name="msapplication-TileImage" content="{{ url_for('static', filename='icons/icon-144.png') }}">
    <meta name="msapplication-config" content="none">
    
    <title>Yurie - AI Chat Assistant</title>
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    
    <!-- Icons for various devices -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-180.png') }}">
    

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Syntax Highlighting for minimal theme -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
    <!-- Inter font for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="chat-header" role="banner">
            <h1>yurie</h1>
            <nav class="header-controls" role="navigation" aria-label="Chat controls">
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
                    <svg class="theme-toggle-icon" width="20" height="20" viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
                        <clipPath id="theme-toggle-cutout">
                            <path d="M0-11h25a1 1 0 0017 13v30H0Z" />
                        </clipPath>
                        <g clip-path="url(#theme-toggle-cutout)">
                            <circle cx="16" cy="16" r="8.4" />
                            <path d="M18.3 3.2c0 1.3-1 2.3-2.3 2.3s-2.3-1-2.3-2.3S14.7.9 16 .9s2.3 1 2.3 2.3zm-4.6 25.6c0-1.3 1-2.3 2.3-2.3s2.3 1 2.3 2.3-1 2.3-2.3 2.3-2.3-1-2.3-2.3zm15.1-10.5c-1.3 0-2.3-1-2.3-2.3s1-2.3 2.3-2.3 2.3 1 2.3 2.3-1 2.3-2.3 2.3zM3.2 13.7c1.3 0 2.3 1 2.3 2.3s-1 2.3-2.3 2.3S.9 17.3.9 16s1-2.3 2.3-2.3zm5.8-7C9 7.9 7.9 9 6.7 9S4.4 8 4.4 6.7s1-2.3 2.3-2.3S9 5.4 9 6.7zm16.3 21c-1.3 0-2.3-1-2.3-2.3s1-2.3 2.3-2.3 2.3 1 2.3 2.3-1 2.3-2.3 2.3zm2.4-21c0 1.3-1 2.3-2.3 2.3S23 7.9 23 6.7s1-2.3 2.3-2.3 2.4 1 2.4 2.3zM6.7 23C8 23 9 24 9 25.3s-1 2.3-2.3 2.3-2.3-1-2.3-2.3 1-2.3 2.3-2.3z" />
                        </g>
                    </svg>
                </button>
                <select id="modelSelector" class="model-selector" aria-label="Select AI model">
                    <optgroup label="Text Models">
                        <option value="text:gpt-4.1">GPT-4.1</option>
                        <option value="text:claude-4-sonnet">Claude 4 Sonnet</option>
                    </optgroup>
                    <optgroup label="Image Models">
                        <option value="image:seedream-3">SeeDream-3</option>
                        <option value="image:imagen-4-ultra">Imagen 4 Ultra</option>
                    </optgroup>
                </select>
                <button class="new-chat-btn" onclick="newChat()" aria-label="Start new chat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path d="M12 5v14M5 12h14" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span class="btn-text">new chat</span>
                </button>
            </nav>
        </header>
        
        <main class="messages-container" id="messagesContainer" role="main" aria-label="Chat messages">
            <div class="welcome-message">
                <h2>welcome to yurie</h2>
                <p>select a model and start chatting. generate text or create images.</p>
                <div class="suggestions" role="group" aria-label="Suggested prompts">
                    <button class="suggestion" onclick="sendSuggestion('Explain quantum computing in simple terms')" aria-label="Send suggestion: Explain quantum computing">
                        explain quantum computing
                    </button>
                    <button class="suggestion" onclick="sendSuggestion('Write a Python function to calculate fibonacci numbers')" aria-label="Send suggestion: Write Python function">
                        write a python function
                    </button>
                    <button class="suggestion" onclick="sendSuggestion('Summarize the key principles of AI ethics')" aria-label="Send suggestion: Summarize AI ethics">
                        summarize ai ethics
                    </button>
                </div>
            </div>
        </main>
        
        <footer class="input-container" role="contentinfo">
            <form class="input-wrapper" role="form" aria-label="Message input form" onsubmit="return false;">
                <div class="input-field-container">
                    <textarea 
                        id="messageInput" 
                        placeholder="Type your message here..."
                        rows="3"
                        aria-label="Message input"
                        aria-required="true"
                    ></textarea>
                    <button type="button" class="send-btn" aria-label="Send message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M22 2L11 13" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M22 2L15 22L11 13L2 9L22 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </form>
        </footer>
    </div>
    
    <!-- Markdown-it and Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <!-- Use the browser-ready highlight.js bundle with common languages -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    
    <!-- Initialize theme -->
    <script>
        // Set initial theme immediately to prevent flash
        (function() {
            const savedTheme = localStorage.getItem('theme');
            // Default to dark theme for minimal design
            const theme = savedTheme || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
        
        // Debug: Test send button immediately
        window.addEventListener('load', function() {
            console.log('[INLINE DEBUG] Window loaded');
            const sendBtn = document.querySelector('.send-btn');
            console.log('[INLINE DEBUG] Send button found:', !!sendBtn);
            if (sendBtn) {
                console.log('[INLINE DEBUG] Send button HTML:', sendBtn.outerHTML);
                console.log('[INLINE DEBUG] Send button parent:', sendBtn.parentElement);
            }
        });
    </script>
    
    <!-- Analytics removed for better compatibility -->
    
    <!-- PWA Install Prompt -->
    <div id="installPrompt" class="install-prompt" style="display: none;">
        <div class="install-prompt-content">
            <h3>Install Yurie</h3>
            <p>Install this app on your device for the best experience.</p>
            <div class="install-prompt-buttons">
                <button id="installDismiss" class="install-dismiss">Not now</button>
                <button id="installButton" class="install-button">Install</button>
            </div>
        </div>
    </div>
    
    <!-- Service Worker Registration -->
    <script>
        // Register service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('{{ url_for('static', filename='sw.js') }}')
                    .then(registration => {
                        console.log('ServiceWorker registered:', registration);
                        
                        // Check for updates periodically
                        setInterval(() => {
                            registration.update();
                        }, 60 * 60 * 1000); // Check every hour
                        
                        // Handle updates
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // New update available
                                    console.log('New update available');
                                    // You can show a notification to the user here
                                }
                            });
                        });
                    })
                    .catch(error => {
                        console.error('ServiceWorker registration failed:', error);
                    });
            });
        }
        
        // PWA Install Prompt
        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installButton = document.getElementById('installButton');
        const installDismiss = document.getElementById('installDismiss');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent the mini-infobar from appearing on mobile
            e.preventDefault();
            // Stash the event so it can be triggered later
            deferredPrompt = e;
            
            // Check if already installed or dismissed
            const dismissed = localStorage.getItem('pwa-install-dismissed');
            const installed = localStorage.getItem('pwa-installed');
            
            if (!dismissed && !installed && !window.matchMedia('(display-mode: standalone)').matches) {
                // Wait a bit before showing the prompt
                setTimeout(() => {
                    installPrompt.style.display = 'block';
                }, 2000);
            }
        });
        
        installButton.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            
            // Show the install prompt
            deferredPrompt.prompt();
            
            // Wait for the user to respond to the prompt
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                console.log('User accepted the install prompt');
                localStorage.setItem('pwa-installed', 'true');
            } else {
                console.log('User dismissed the install prompt');
            }
            
            // Clear the deferred prompt
            deferredPrompt = null;
            installPrompt.style.display = 'none';
        });
        
        installDismiss.addEventListener('click', () => {
            localStorage.setItem('pwa-install-dismissed', 'true');
            installPrompt.style.display = 'none';
        });
        
        // Detect if app was launched in standalone mode
        window.addEventListener('appinstalled', () => {
            console.log('PWA was installed');
            localStorage.setItem('pwa-installed', 'true');
        });
        
        // iOS install instructions
        if (navigator.standalone === false && /iPhone|iPad|iPod/.test(navigator.userAgent)) {
            // Show iOS-specific install instructions if not installed
            // This could be a custom prompt explaining how to add to home screen
        }
    </script>
</body>
</html>
