<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Yurie - AI Chat Assistant">
    <title>Yurie - AI Chat Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Syntax Highlighting for minimal theme -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
    <!-- Inter font for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="chat-header" role="banner">
            <h1>yurie</h1>
            <nav class="header-controls" role="navigation" aria-label="Chat controls">
                <select id="modelSelector" class="model-selector" aria-label="Select AI model">
                    <option value="text">text model</option>
                    <option value="image">image model</option>
                </select>
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                    <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <circle cx="12" cy="12" r="5" stroke-width="2"/>
                        <path d="M12 1v6m0 6v6m-9-9h6m6 0h6m-7.07-7.07l4.24 4.24M4.93 19.07l4.24-4.24m0-5.66l-4.24-4.24m14.14 14.14l-4.24-4.24" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <svg class="moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button id="newChat" class="new-chat-btn" aria-label="Start new chat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path d="M12 5v14M5 12h14" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span class="btn-text">new chat</span>
                </button>
            </nav>
        </header>
        
        <main class="messages-container" id="messagesContainer" role="main" aria-label="Chat messages">
            <div class="welcome-message">
                <h2>welcome to yurie</h2>
                <p>select a model and start chatting. generate text or create images.</p>
                <div class="suggestions" role="group" aria-label="Suggested prompts">
                    <button class="suggestion">
                        explain quantum computing
                    </button>
                    <button class="suggestion">
                        generate cyberpunk cityscape
                    </button>
                    <button class="suggestion">
                        write an ai haiku
                    </button>
                </div>
            </div>
        </main>
        
        <footer class="input-container" role="contentinfo">
            <form id="chatForm" class="input-wrapper" role="form" aria-label="Message input form">
                <div class="input-field-container">
                    <textarea 
                        id="messageInput" 
                        placeholder="Type your message here..."
                        rows="3"
                        aria-label="Message input"
                        aria-required="true"
                    ></textarea>
                    <button id="sendButton" type="submit" disabled aria-label="Send message">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </form>
        </footer>
    </div>
    
    <!-- External libraries -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/cpp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/css.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/html.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/typescript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/sql.min.js"></script>
    
    <!-- Main application script, deferred to run after DOM is parsed -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
